<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartPackageBox Official Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Technical Documentation for SmartPackageBox">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #2c88d9;
      --sidebar-width: 19rem;
      --heading-font-weight: 500;
    }
    
    body {
      letter-spacing: 0.2px;
      line-height: 1.6;
    }

    .markdown-section {
      max-width: 850px;
      padding-top: 2rem;
    }

    .sidebar {
      padding-top: 1rem;
    }
    
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'SmartPackageBox',
      loadSidebar: true,
      subMaxLevel: 2,
      homepage: 'README.md',
      auto2top: true,
      search: 'auto'
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });
    window.mermaid = mermaid;
  </script>
  <script src="//unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
</body>
</html>
